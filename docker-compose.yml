services:

  # ─────────────────────────────────────────────────────────────
  # Backend: Python pipeline + Streamlit dashboard
  # ─────────────────────────────────────────────────────────────
  stock-advisor:
    build: .
    container_name: stock4n_app
    volumes:
      - .:/app
      - ./data:/app/data
    ports:
      - "8501:8501" # Streamlit dashboard
      - "8502:8502" # REST API for frontend
    environment:
      - TZ=Asia/Ho_Chi_Minh
    env_file:
      - path: .env
        required: false
    restart: unless-stopped
    mem_limit: 4g

  # ─────────────────────────────────────────────────────────────
  # Frontend: Next.js web app (chạy local thay Vercel)
  # ─────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8502
    container_name: stock4n_frontend
    ports:
      - "4000:3000" # http://localhost:4000
    volumes:
      # Mount db.json từ backend export → frontend public/data/
      # Khi backend export xong, frontend tự nhận data mới
      - ./data/export/db.json:/app/public/data/db.json:ro
    environment:
      - TZ=Asia/Ho_Chi_Minh
      - NODE_ENV=production
    restart: unless-stopped
    depends_on:
      - stock-advisor
